<!-- Load Mermaid -->
<script type="module">
  import mermaid from 'https://jsdelivr.net';
  
  // Wait for the DOM to load, then convert Jekyll code blocks to Mermaid divs
  document.addEventListener("DOMContentLoaded", function() {
    const codeBlocks = document.querySelectorAll("pre code.language-mermaid");
    
    codeBlocks.forEach(function(block) {
      // Create a new div element
      const div = document.createElement("div");
      div.className = "mermaid";
      div.textContent = block.textContent;
      
      // Find the parent <pre> element and replace it with our new <div>
      const pre = block.parentElement;
      pre.parentElement.replaceChild(div, pre);
    });

    // Initialize Mermaid now that the elements are correctly structured
    mermaid.initialize({ startOnLoad: true });
  });
</script>
